# 本地开发环境配置文件

# Spring 框架配置
spring:
    # 外部配置导入
    config:
        # 导入用户目录下的密钥配置文件，该文件不纳入版本控制
        import: file:${user.home}/.config/application-local-secret.yml

    # 输出配置
    output:
        # ANSI 彩色输出配置
        ansi:
            # 始终启用彩色输出（可选值：ALWAYS、NEVER、DETECT），便于本地日志查看和调试
            enabled: ALWAYS

# 服务器配置
server:
    # 服务端口，本地开发使用固定端口避免冲突
    port: 35025

# 日志配置
logging:
    # 日志级别配置
    level:
        # 项目根包日志级别，本地开发启用 TRACE 以输出最详细的诊断信息
        com.example: TRACE

    # 日志文件存储目录，macOS 无 /var/log 写权限，改用项目本地目录
    file:
        path: ./logs

# Spring Boot Actuator 监控端点配置
management:
    # 管理服务器配置
    server:
        # 管理服务端口，独立于主服务端口，避免 actuator 端点暴露在主端口上
        port: 35035

    # 端点 Web 暴露配置
    endpoints:
        web:
            exposure:
                # 暴露的端点列表，"*" 表示全部暴露（本地开发环境便于调试）
                include: "*"

    # 单端点配置
    endpoint:
        health:
            # 始终展示组件细节（可选值：never、always、when-authorized），包含各 HealthIndicator 的 status 与 detail 字段，便于本地调试
            show-details: always

    # 指标环境标签
    metrics:
        tags:
            # 运行环境标识，便于在多环境场景下按环境维度聚合指标
            env: "local"
