# 本地开发环境配置文件

# Spring 框架配置
spring:
    # 外部配置导入
    config:
        # 导入用户目录下的密钥配置文件，该文件不纳入版本控制
        import: file:${user.home}/.config/application-local-secret.yml

    # 数据源配置
    datasource:
        # 数据库连接 URL，连接本机 MySQL 实例的 project_server 库
        url: jdbc:mysql://${MYSQL_HOST}:3306/project_server
        # 数据库用户名
        username: ${MYSQL_USERNAME}
        # 数据库密码
        password: ${MYSQL_PASSWORD}

    # Spring Data 配置
    data:
        # Redis 缓存配置
        redis:
            # Redis 服务器地址
            host: ${REDIS_HOST}
            # Redis 用户名
            username: ${REDIS_USERNAME}
            # Redis 密码
            password: ${REDIS_PASSWORD}
            # Redis 数据库编号
            database: 0
            # Redis 服务端口
            port: 6379

    # 输出配置
    output:
        # ANSI 彩色输出配置
        ansi:
            # 始终启用彩色输出（可选值：ALWAYS、NEVER、DETECT），便于本地日志查看和调试
            enabled: ALWAYS

    # Spring AI 配置
    ai:
        # OpenAI 配置
        openai:
            # OpenAI API 密钥
            api-key: ${OPENAI_API_KEY}

# 服务器配置
server:
    # 服务端口，本地开发使用固定端口避免冲突
    port: 35025

# 日志配置
logging:
    # 日志级别配置
    level:
        # 项目根包日志级别
        com.example: TRACE
        # 关闭 Netty macOS DNS 原生库加载告警，本地开发环境该告警无业务影响
        io.netty.resolver.dns: OFF

    # 日志文件存储目录，macOS 无 /var/log 写权限，改用项目本地目录
    file:
        path: ./logs

# Spring Boot Actuator 监控端点配置
management:
    # 端点 Web 暴露配置
    endpoints:
        web:
            exposure:
                # 暴露的端点列表，"*" 表示全部暴露（本地开发环境便于调试）
                include: "*"

    # 单端点配置
    endpoint:
        health:
            # 始终展示组件细节（可选值：never、always、when-authorized），包含各 HealthIndicator 的 status 与 detail 字段，便于本地调试
            show-details: always

    # 指标环境标签
    metrics:
        tags:
            # 运行环境标识，便于在 Prometheus 中按环境聚合
            env: "local"
