# 项目主配置文件
# 包含所有环境通用的配置项，特定环境配置请参考对应的 profile 配置文件

# Spring 框架配置
spring:
    # 应用基本信息
    application:
        # 应用名称，用于服务注册和监控标识
        name: "awesome-springboot-boilerplate"

    # Spring 环境配置
    profiles:
        # 激活的配置文件
        active: local

    # 主应用配置
    main:
        # 关闭 Spring Boot 启动 banner，减少控制台输出
        banner-mode: off

    # 输出配置
    output:
        # ANSI 彩色输出配置
        ansi:
            # 始终启用彩色输出（可选值：ALWAYS、NEVER、DETECT），便于日志查看和调试
            enabled: ALWAYS

    # 生命周期配置
    lifecycle:
        # 每个关闭阶段的超时时间（秒）
        timeout-per-shutdown-phase: 60s

    # 线程配置
    threads:
        # 虚拟线程配置
        virtual:
            # 启用虚拟线程（Java 25+）
            enabled: true

    # 任务执行与调度配置
    task:
        execution:
            # 启用上下文传播，自动注册 ContextPropagatingTaskDecorator，将 MDC、Observation、Span 等传播到异步任务线程
            propagate-context: true
            # 异步虚拟线程名前缀，便于在线程 dump 和日志中识别 @Async 创建的虚拟线程
            thread-name-prefix: "async-"
            # 关闭配置
            shutdown:
                # 关闭时等待正在执行的异步任务完成，避免任务被强制中断
                await-termination: true
                # 等待时间，超时后强制关闭
                await-termination-period: 30s
        # 任务调度配置，使用虚拟线程版 SimpleAsyncTaskScheduler（并发无限制，每个定时任务独立虚拟线程）
        scheduling:
            # 关闭配置
            shutdown:
                # 关闭时等待正在执行的定时任务完成，避免任务被强制中断
                await-termination: true
                # 等待时间，超时后强制关闭
                await-termination-period: 30s

    # 自动配置排除项
    autoconfigure:
        # 需要排除的自动配置类列表
        exclude:
            # 排除 Spring Security 默认用户详情服务自动配置，避免生成默认密码的警告
            - org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

    # Spring Cache 缓存配置
    cache:
        # 缓存类型，使用 Redis 作为缓存实现
        type: redis

    # 数据源配置
    datasource:
        # 数据库连接 URL，连接 MySQL 实例的 awesome_project_database 库
        url: jdbc:mysql://${MYSQL_HOST}:3306/awesome_project_database
        # 数据库用户名
        username: ${MYSQL_USERNAME}
        # 数据库密码
        password: ${MYSQL_PASSWORD}

    # Spring Data 配置
    data:
        # Redis 缓存配置
        redis:
            # Redis 服务器地址
            host: ${REDIS_HOST}
            # Redis 用户名
            username: ${REDIS_USERNAME}
            # Redis 密码
            password: ${REDIS_PASSWORD}
            # Redis 数据库编号
            database: 0
            # Redis 服务端口
            port: 6379
            # 启用 Redis TLS 加密
            ssl:
                enabled: true

    # Spring AI 配置
    ai:
        # OpenAI 配置
        openai:
            # OpenAI API 密钥
            api-key: ${OPENAI_API_KEY}

# 服务器配置
server:
    # 优雅关闭配置
    shutdown: graceful

# 日志配置
logging:
    # 日志级别配置
    level:
        # 关闭 Netty DNS 原生库加载告警，该告警无业务影响
        io.netty.resolver.dns: OFF

# Spring Boot Actuator 监控配置
management:
    # 端点 Web 暴露配置
    endpoints:
        web:
            exposure:
                # 暴露的端点列表，仅暴露无敏感信息的端点
                include: "health,info"

    # 单端点配置
    endpoint:
        health:
            # 展示组件细节的时机（可选值：never、always、when-authorized）
            show-details: always

    # 健康检查组件配置
    health:
        # SSL 健康检查
        ssl:
            # 禁用 SSL 健康检查，项目未启用 HTTPS
            enabled: false

    # 指标通用标签，所有 Micrometer 指标都会自动携带，便于按维度聚合
    metrics:
        tags:
            # 应用名标识，多服务场景下区分指标来源
            application: ${spring.application.name}

    # 分布式链路追踪配置，引入 bridge 后 traceId/spanId 自动注入 MDC
    tracing:
        # 采样策略配置
        sampling:
            # 采样概率（可选值：0.0~1.0），设为 1.0 保证每个请求的 traceId/spanId 注入 MDC，实现全量日志按请求链路关联
            probability: 1.0

    # OpenTelemetry OTLP 上报配置，将链路追踪数据通过 HTTP 协议上报到阿里云 OpenTelemetry 服务接入点
    # 鉴权信息已嵌入接入点 URL 路径（adapt_<实例>@<令牌> 格式），无需额外的 Authentication header
    opentelemetry:
        # 链路追踪导出配置
        tracing:
            export:
                otlp:
                    # 传输协议（可选值：grpc、http），使用 HTTP 避免引入 gRPC 依赖
                    transport: http
                    # 阿里云 Trace 接入点地址，鉴权信息嵌入 URL 路径中
                    endpoint: ${OTLP_HTTP_TRACING_ENDPOINT}

    # Micrometer OTLP 指标上报配置
    otlp:
        metrics:
            export:
                # 阿里云 Metric 接入点地址，鉴权信息嵌入 URL 路径中
                url: ${OTLP_HTTP_METRICS_ENDPOINT}
                # 指标上报间隔
                step: 30s

    # Info 端点贡献者配置
    info:
        # 暴露环境变量中以 info.* 开头的属性
        env:
            enabled: true
        # 暴露 JDK 运行时信息
        java:
            enabled: true
        # 暴露操作系统信息
        os:
            enabled: true
