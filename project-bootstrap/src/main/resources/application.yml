# 项目主配置文件
# 包含所有环境通用的配置项，特定环境配置请参考对应的 profile 配置文件

# Spring 框架配置
spring:
    # 应用基本信息
    application:
        # 应用名称，用于服务注册和监控标识
        name: "awesome-springboot-boilerplate"

    # Spring 环境配置
    profiles:
        # 激活的配置文件
        active: local

    # 主应用配置
    main:
        # 关闭 Spring Boot 启动 banner，减少控制台输出
        banner-mode: off

    # 生命周期配置
    lifecycle:
        # 每个关闭阶段的超时时间（秒）
        timeout-per-shutdown-phase: 60s

    # 线程配置
    threads:
        # 虚拟线程配置
        virtual:
            # 启用虚拟线程（Java 25+）
            enabled: true

    # 任务执行与调度配置
    task:
        execution:
            # 启用上下文传播，自动注册 ContextPropagatingTaskDecorator，将 MDC、Observation、Span 等传播到异步任务线程
            propagate-context: true
            # 异步虚拟线程名前缀，便于在线程 dump 和日志中识别 @Async 创建的虚拟线程
            thread-name-prefix: "async-"
            # 关闭配置
            shutdown:
                # 关闭时等待正在执行的异步任务完成，避免任务被强制中断
                await-termination: true
                # 等待时间，超时后强制关闭
                await-termination-period: 30s
        # 任务调度配置，使用虚拟线程版 SimpleAsyncTaskScheduler（并发无限制，每个定时任务独立虚拟线程）
        scheduling:
            # 关闭配置
            shutdown:
                # 关闭时等待正在执行的定时任务完成，避免任务被强制中断
                await-termination: true
                # 等待时间，超时后强制关闭
                await-termination-period: 30s

    # 自动配置排除项
    autoconfigure:
        # 需要排除的自动配置类列表
        exclude:
            # 排除 Spring Security 默认用户详情服务自动配置，避免生成默认密码的警告
            - org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

    # Spring Cache 缓存配置
    cache:
        # 缓存类型，使用 Redis 作为缓存实现
        type: redis

# 服务器配置
server:
    # 优雅关闭配置
    shutdown: graceful

# Spring Boot Actuator 监控配置
management:
    # 端点 Web 暴露配置
    endpoints:
        web:
            exposure:
                # 暴露的端点列表，仅暴露无敏感信息的端点
                include: "health,info"

    # 单端点配置
    endpoint:
        health:
            # 展示组件细节的时机（可选值：never、always、when-authorized）
            show-details: when-authorized

    # 健康检查组件配置
    health:
        # SSL 健康检查
        ssl:
            # 禁用 SSL 健康检查，项目未启用 HTTPS
            enabled: false

    # 指标通用标签，所有 Micrometer 指标都会自动携带，便于按维度聚合
    metrics:
        tags:
            # 应用名标识，多服务场景下区分指标来源
            application: ${spring.application.name}

    # 分布式链路追踪配置，引入 bridge 后 traceId/spanId 自动注入 MDC
    tracing:
        # 采样策略配置
        sampling:
            # 采样概率（可选值：0.0~1.0），设为 1.0 保证每个请求的 traceId/spanId 注入 MDC，实现全量日志按请求链路关联
            probability: 1.0

    # OpenTelemetry OTLP 上报配置
    # 所有遥测数据统一上报到 Grafana Alloy（本地 sidecar 代理），由 Alloy 负责批量处理、路由转发和后端鉴权
    # 应用无需直接对接远端可观测后端，只需将数据发送到本地 Alloy OTLP 接收器
    opentelemetry:
        # 链路追踪导出配置
        tracing:
            export:
                otlp:
                    # 传输协议（可选值：grpc、http），使用 HTTP 避免引入 gRPC 依赖
                    transport: http
                    # 链路追踪上报端点，默认指向本地 Alloy OTLP HTTP 接收器
                    # 生产环境通过 OTLP_ENDPOINT 环境变量覆盖（如 http://alloy:4318）
                    endpoint: ${OTLP_ENDPOINT:http://localhost:4318}

    # Micrometer OTLP 指标上报配置
    otlp:
        metrics:
            export:
                # 指标上报地址，默认指向本地 Alloy OTLP HTTP 接收器
                # 生产环境通过 OTLP_ENDPOINT 环境变量覆盖（如 http://alloy:4318）
                url: ${OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
                # 指标上报间隔
                step: 30s

    # Info 端点贡献者配置
    info:
        # 暴露环境变量中以 info.* 开头的属性
        env:
            enabled: true
        # 暴露 JDK 运行时信息
        java:
            enabled: true
        # 暴露操作系统信息
        os:
            enabled: true
